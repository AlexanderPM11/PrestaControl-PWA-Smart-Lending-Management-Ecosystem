services:
  db:
    image: mysql:8.0
    container_name: prestacontrol-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./Prestacontrol - Api
      dockerfile: Dockerfile
    container_name: prestacontrol-api
    restart: always
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=db;Database=${MYSQL_DATABASE};User=root;Password=${MYSQL_ROOT_PASSWORD};
      - Telegram__BotToken=${TELEGRAM_BOT_TOKEN}
      - Telegram__AdminChatId=${TELEGRAM_ADMIN_CHAT_ID}
    ports:
      - "5112:8080"
    depends_on:
      db:
        condition: service_healthy

  pwa:
    build:
      context: ./prestacontrol-pwa
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL}
    container_name: prestacontrol-pwa
    restart: always
    ports:
      - "5173:80"
    depends_on:
      - api

volumes:
  db_data:
