services:
  db:
    image: mysql:8.0
    container_name: prestacontrol-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 1234
      MYSQL_DATABASE: prestacontrol_db
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./Prestacontrol - Api
      dockerfile: Dockerfile
    container_name: prestacontrol-api
    restart: always
    environment:
      - ConnectionStrings__DefaultConnection=Server=db;Database=prestacontrol_db;User=root;Password=1234;
      - ASPNETCORE_ENVIRONMENT=Development
    ports:
      - "5112:8080"
    depends_on:
      db:
        condition: service_healthy

  pwa:
    build:
      context: ./prestacontrol-pwa
      dockerfile: Dockerfile
    container_name: prestacontrol-pwa
    restart: always
    ports:
      - "5173:80"
    depends_on:
      - api

volumes:
  db_data:
